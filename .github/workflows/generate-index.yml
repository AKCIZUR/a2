name: Generate Nested Docs Index

on:
  push:
    paths:
      - 'content/**/*.md'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate nested index
        run: |
          node <<'EOF'
          const fs = require('fs');
          const path = require('path');

          const CONTENT_DIR = 'content';

          function getTitle(filePath) {
            const content = fs.readFileSync(filePath, 'utf-8');
            const firstLine = content.split('\n')[0];
            return firstLine.replace(/^# /, '').trim() || path.basename(filePath, '.md');
          }

          function walk(dir) {
            const entries = fs.readdirSync(dir, { withFileTypes: true });

            return entries
              .filter(e => !e.name.startsWith('_'))
              .map(entry => {
                const fullPath = path.join(dir, entry.name);

                if (entry.isDirectory()) {
                  return {
                    title: entry.name,
                    path: '/' + fullPath.replace(CONTENT_DIR, '').replace(/\\/g, '/'),
                    children: walk(fullPath)
                  };
                }

                if (entry.name.endsWith('.md')) {
                  const rel = fullPath.replace(CONTENT_DIR, '').replace(/\\/g, '/');
                  const name = entry.name.replace('.md', '');
                  return {
                    title: getTitle(fullPath),
                    path: name === 'home' ? '/' : rel.replace('.md',''),
                    file: rel.replace(/^\//,'')
                  };
                }
              })
              .filter(Boolean);
          }

          const tree = walk(CONTENT_DIR);

          fs.writeFileSync(
            path.join(CONTENT_DIR, 'docs-index.json'),
            JSON.stringify(tree, null, 2)
          );
          EOF

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add content/docs-index.json
          git commit -m "auto: nested docs index" || echo "No changes"
          git push
